{% set name = "pybigquery" %}
{% set version = "0.5.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: a8cc932081f4f94dbc694b4976cd0ead583b01614bd941ba1dae632ce5d072e0

build:
  noarch: python
  entry_points:
    - bigquery = pybigquery.sqlalchemy_bigquery:BigQueryDialect
  number: 1
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python {{ python_min }}
    - pip
  run:
    - sqlalchemy >=1.1.9
    - google-cloud-bigquery >=1.6.0
    - future

test:
  requires:
    - python {{ python_min }}
  imports:
    - pybigquery
    - pybigquery.api
    - pybigquery.parse_url
    - pybigquery.sqlalchemy_bigquery

about:
  home: https://github.com/mxmzdlv/pybigquery
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: SQLAlchemy dialect and API client for BigQuery.

extra:
  recipe-maintainers:
    - tim-werner
